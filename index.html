<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое Резюме</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #e3f2fd;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .personal-photo {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 20px; /* Центрирование по горизонтали */
            border: 3px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-5">Мое Резюме</h1>

        <!-- Личная информация -->
        <div id="personal-info" class="section">
            <img src="https://main-cdn.sbermegamarket.ru/big1/hlr-system/241/032/782/112/817/36/100045249601b0.jpg" alt="Фото" class="personal-photo">
            <h2 class="section-title">Личная информация</h2>
            <div class="card">
                <div class="card-body">
                    <p><strong>Имя:</strong> <span id="name"></span></p>
                    <p><strong>Email:</strong> <span id="email"></span></p>
                    <p><strong>Телефон:</strong> <span id="phone"></span></p>
                </div>
            </div>
        </div>

<!-- Языки -->
<div id="languages" class="section">
    <h2 class="section-title">Языки</h2>
    <div class="card mb-3">
        <div class="card-body">
            <div id="languages-list" class="row"></div>
        </div> 
    </div>
</div>

<!-- Образование -->
<div id="education" class="section">
    <h2 class="section-title">Образование</h2>
    <div class="card mb-3">
        <div class="card-body">
            <div id="education-list" class="row"></div>
        </div>
    </div>
</div>



    <script>

         async function fetchData() {
            try {
                const response = await fetch('resume.json');
                if (!response.ok) throw new Error('Ошибка загрузки');
                return await response.json();
            } catch (error) {
                console.error('Ошибка:', error);
                return null;
            }
        }


        function renderPersonalInfo(data) {
            document.getElementById('name').textContent = data.name;
            document.getElementById('email').textContent = data.email;
            document.getElementById('phone').textContent = data.phone;
        }

function renderLanguages(languages) {
    const container = document.getElementById('languages-list');
    container.innerHTML = ''; // очищаем контейнер перед добавлением

    languages.forEach(lan => {
        const item = `
            <div class="col-md-6">
                <div>
                    <p><strong>Язык:</strong> ${lan.name}</p>
                    <p><strong>Уровень:</strong> ${lan.level}</p>
                </div>
            </div>
        `;
        container.innerHTML += item;
    });
}

function renderEducation(education) {
    const container = document.getElementById('education-list');
    container.innerHTML = ''; // очищаем контейнер перед добавлением

    education.forEach(edu => {
        const item = `
            <div class="col-md-6">
                <div>
                    <h5>${edu.degree}</h5>
                    <p><strong>Учебное заведение:</strong> ${edu.institution}</p>
                    <p><strong>Год окончания:</strong> ${edu.year}</p>
                </div>
            </div>
        `;
        container.innerHTML += item;
    });
}


        
        async function renderResume() {
            const resume = await fetchData();

            renderPersonalInfo(resume.personal);
            renderEducation(resume.education);
            renderLanguages(resume.languages);
        }

        renderResume();
    </script>
</body>
</html>
