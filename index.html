<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Резюме</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>

<div class="glass-card">
    <div class="resume-content">
        
        <div class="text-center mb-4">
            <h1 class="hero-title">Резюме</h1>
        </div>

        <div id="personal-info" class="section">
            <img src="https://main-cdn.sbermegamarket.ru/big1/hlr-system/241/032/782/112/817/36/100045249601b0.jpg" alt="Фото" class="personal-photo">
            <div class="custom-card mt-3">
                <div class="card-body p-0">
                    <div class="info-line"><i class="fas fa-user-circle"></i> <strong>Имя:</strong> <span id="name"></span></div>
                    <div class="info-line"><i class="fas fa-envelope"></i> <strong>Email:</strong> <span id="email"></span></div>
                    <div class="info-line"><i class="fas fa-phone-alt"></i> <strong>Телефон:</strong> <span id="phone"></span></div>
                    <div class="info-line"><i class="fas fa-home"></i> <strong>Город:</strong> <span id="city"></span></div>
                </div>
            </div>
        </div>

        <div id="skills" class="section">
            <h2 class="section-title"><i class="fas fa-bolt"></i> Навыки и изученные дисциплины</h2>
            <div id="skills-list" class="grid-modern"></div>
        </div>

        <div id="education" class="section">
            <h2 class="section-title"><i class="fas fa-graduation-cap"></i> Образование</h2>
            <div id="education-list" class="grid-modern"></div>
        </div>

        <div id="softskills" class="section">
            <h2 class="section-title"><i class="fas fa-star"></i> Личные качества</h2>
            <div id="softskills-list" class="grid-modern"></div>
        </div>

        <div id="additional" class="section">
            <h2 class="section-title"><i class="fas fa-circle-exclamation"></i> Дополнительно</h2>
            <div id="additional-list" class="grid-modern"></div>
        </div>

        <div class="text-center mt-4">
    <button id="downloadPDF" class="btn btn-primary" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 12px 30px; border-radius: 30px; font-weight: 600;">
        <i class="fas fa-download"></i> Скачать резюме в PDF
    </button>
</div>
        
    </div>
</div>

<script src="script.js?v=21"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</body>
</html>
